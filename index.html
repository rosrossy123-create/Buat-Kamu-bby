<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Bby ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#ffd6e7,#ffeef5);
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Hati background */
.heart{
    position:absolute;
    color:#ff7aa8;
    animation:float 6s linear infinite;
    opacity:.4;
}

@keyframes float{
    from{
        transform:translateY(100vh);
    }
    to{
        transform:translateY(-120px);
    }
}

.container{
    position:relative;
    width:320px;
    height:260px;
    margin-top:200px;
}

/* Amplop */
.envelope{
    position:absolute;
    bottom:0;
    width:100%;
    height:200px;
    cursor:pointer;
}

.envelope-body{
    position:absolute;
    width:100%;
    height:100%;
    background:#ff9fc3;
    border-radius:0 0 12px 12px;
    z-index:4;
}

.flap{
    position:absolute;
    top:0;
    width:100%;
    height:120px;
    background:#ffb6d2;
    clip-path:polygon(0 0,100% 0,50% 100%);
    transform-origin:top;
    transition:1s;
    z-index:7;
}

.open .flap{
    transform:rotateX(180deg);
}

/* Surat */
.letter{
    position:absolute;
    left:10%;
    width:80%;
    height:150px;
    top:90px;
    background:white;
    border-radius:10px;
    padding:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.15);
    z-index:3;
    transition:1.5s ease;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

.open .letter{
    transform:translateY(-357px);
}

.text{
    opacity:0;
    transition:1s;
    transition-delay:1.2s;
    color:#ff5b96;
}

.open .text{
    opacity:1;
}

.title{
    position:absolute;
    top:-10px;
    width:100%;
    text-align:center;
    color:white;
    font-size:24px;
    font-weight:bold;
    z-index:3;
    color:#ff5b96;
    font-size:22px;
    font-weight:bold;
}

.click{
    position:absolute;
    bottom:-45px;
    width:100%;
    text-align:center;
    color:#ff5b96;
    animation:blink 1.5s infinite;
}

@keyframes blink{
    50%{
        opacity:.3;
    }
}
</style>
</head>
<body>

<div id="hearts"></div>

<div class="container">

    <div class="title">For Bby 💌</div>

    <div class="letter">
        <div class="text">
            <h2>HAII BEBBY SELAMAT PAGIII CINTAKU</h2>
            <br>
            <p>Kamu jangan suka badmood yaw 💕</p>
        </div>
    </div>

    <div class="envelope" onclick="openLetter()">
        <div class="flap"></div>
        <div class="envelope-body"></div>
    </div>

    <div class="click">Klik ga?!😠 💖</div>

</div>

<script>
function openLetter(){
    document.querySelector('.container').classList.add('open');
}

// hati beterbangan
const hearts = document.getElementById('hearts');

for(let i=0;i<25;i++){
    const heart=document.createElement('div');
    heart.classList.add('heart');
    heart.innerHTML='❤';
    heart.style.left=Math.random()*100+'vw';
    heart.style.fontSize=(15+Math.random()*25)+'px';
    heart.style.animationDuration=(4+Math.random()*4)+'s';
    heart.style.animationDelay=Math.random()*5+'s';
    hearts.appendChild(heart);
}
</script>

</body>
</html>
